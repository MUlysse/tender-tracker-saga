name: Tender-Tracker SAGA - Scraper

on:
  schedule:
    # Exécution toutes les 2 heures (gratuit et efficace)
    # 12 scans/jour × ~4 min = 48 min/jour = 1440 min/mois < 2000 (quota gratuit)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Permet un lancement manuel depuis GitHub UI
  repository_dispatch:
    types: [run-scraper]  # Permet de déclencher via webhook

jobs:
  scrape-tenders:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run Scraper
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          NOTIFICATION_ENABLED: ${{ secrets.NOTIFICATION_ENABLED }}
        run: |
          python scripts/scraper.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit & Push Changes
        if: success()
        run: |
          if git diff --quiet docs/data.json; then
            echo "✅ No changes to commit"
          else
            echo "📝 Changes detected - committing..."
            git add docs/data.json
            git commit -m "✅ Automated Tender Update - Run #${{ github.run_number }}"
            git push origin main
            echo "✅ Changes pushed successfully"
          fi

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Scraper failed - Run: ${{ github.run_id }}"
          echo "📋 Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
