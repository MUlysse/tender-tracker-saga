<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouverture...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .message {
            text-align: center;
            padding: 32px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #202124;
        }
        p {
            font-size: 14px;
            color: #5f6368;
            line-height: 1.6;
            margin: 8px 0;
        }
        .keyword {
            background-color: #FFFF00;
            color: black;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin: 8px 0;
        }
        .hint {
            background-color: #e8f0fe;
            border-left: 4px solid #1a73e8;
            padding: 12px;
            margin-top: 16px;
            font-size: 13px;
            color: #1a73e8;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="message">
        <h1>🔍 Recherche du mot-clé...</h1>
        <p>La page est en cours d'ouverture.</p>
        <p>Le mot-clé suivant sera mis en évidence :</p>
        <div class="keyword" id="keywordDisplay">Chargement...</div>
        <div class="hint">
            ℹ️ Si la recherche ne se lance pas automatiquement, appuyez sur <strong>Ctrl+F</strong> (ou <strong>Cmd+F</strong> sur Mac) et cherchez le mot-clé.
        </div>
    </div>

    <script>
        // Récupérer les paramètres
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        const keyword = params.get('keyword');

        if (!url) {
            document.querySelector('.message h1').textContent = '❌ Erreur';
            document.querySelector('.message p').textContent = 'Aucune URL fournie.';
            document.getElementById('keywordDisplay').textContent = '-';
        } else {
            // Afficher le mot-clé
            if (keyword) {
                document.getElementById('keywordDisplay').textContent = keyword;
            }

            // Ouvrir le site cible après 1 seconde
            setTimeout(() => {
                // Ouvrir avec le fragment pour que le userscript (si installé) le détecte
                const targetUrl = url + '#tender-tracker-search:' + encodeURIComponent(keyword || '');
                window.location.href = targetUrl;
            }, 1000);
        }
    </script>
</body>
</html>
