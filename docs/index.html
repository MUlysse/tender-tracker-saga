<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Tender Tracker SAGA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #202124;
            font-size: 15.4px;
            line-height: 1.5;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .login-box {
            width: 100%;
            max-width: 360px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid #dadce0;
            border-radius: 2px;
        }

        .login-title {
            font-size: 30.8px;
            font-weight: 600;
            color: #202124;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .login-subtitle {
            font-size: 13.2px;
            color: #80868b;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12.1px;
            font-weight: 600;
            color: #202124;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 13.2px 13.2px;
            font-size: 15.4px;
            border: 1px solid #dadce0;
            background-color: #ffffff;
            color: #202124;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            border-radius: 2px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1f2937;
            box-shadow: 0 0 0 3px rgba(31, 41, 55, 0.1);
        }

        .login-button {
            padding: 13.2px 17.6px;
            margin-top: 8px;
            font-size: 15.4px;
            font-weight: 600;
            color: #ffffff;
            background-color: #1f2937;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: inherit;
            border-radius: 2px;
        }

        .login-button:hover {
            background-color: #111827;
        }

        .error-message {
            font-size: 13.2px;
            color: #d32f2f;
            text-align: center;
            display: none;
            margin-top: 12px;
        }

        /* ===== MAIN DASHBOARD ===== */
        .dashboard {
            display: none;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .dashboard.active {
            display: block;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 48px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 35.2px;
            font-weight: 600;
            color: #202124;
            letter-spacing: -0.5px;
        }

        .scan-info {
            display: flex;
            gap: 40px;
            font-size: 12.1px;
            color: #5f6368;
            text-align: right;
            line-height: 1.6;
        }

        .scan-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .scan-label {
            font-weight: 600;
            display: block;
            font-size: 11px;
        }

        .scan-time {
            display: block;
            font-size: 13.2px;
            color: #202124;
            font-weight: 500;
        }

        .scan-button {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            background-color: #1a73e8;
            border: 1px solid #1a73e8;
            cursor: pointer;
            transition: background-color 0.2s ease, opacity 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: inherit;
            border-radius: 2px;
            margin-top: 8px;
        }

        .scan-button:hover:not(:disabled) {
            background-color: #0d47a1;
        }

        .scan-button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ===== TABS ===== */
        .tabs-container {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 0;
        }

        .tab-button {
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            color: #5f6368;
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tab-button:hover {
            color: #202124;
        }

        .tab-button.active {
            color: #1f2937;
            border-bottom-color: #1f2937;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== ALERTES SECTION ===== */
        .alerts-section {
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 2px;
            padding: 16px;
            margin-bottom: 32px;
        }

        .alerts-title {
            font-size: 13.2px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #202124;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #1f2937;
        }

        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .alert-item {
            padding: 13.2px;
            background-color: #ffffff;
            border: 1px solid #e8eaed;
            border-left: 3px solid #1f2937;
            border-radius: 2px;
            font-size: 14.3px;
            transition: background-color 0.15s ease;
        }

        .alert-item:hover {
            background-color: #f8f9fa;
        }

        .alert-country {
            font-weight: 600;
            color: #202124;
            display: block;
            margin-bottom: 3px;
            font-size: 14.3px;
        }

        .alert-title {
            font-size: 13.2px;
            color: #5f6368;
            margin-bottom: 4px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .alert-keywords {
            font-size: 12.1px;
            color: #80868b;
            display: block;
        }

        .alerts-empty {
            font-size: 14.3px;
            color: #80868b;
            padding: 8px 12px;
        }

        /* ===== KEYWORDS SECTION ===== */
        .keywords-section {
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 2px;
            padding: 20px;
        }

        .keywords-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .keywords-category {
            background-color: #ffffff;
            border: 1px solid #e8eaed;
            border-radius: 2px;
            padding: 16px;
        }

        .keywords-category-title {
            font-size: 12.1px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #202124;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8eaed;
        }

        .keywords-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .keyword-item {
            font-size: 13.2px;
            color: #5f6368;
            padding: 6px 8px;
            background-color: #f8f9fa;
            border-radius: 2px;
            border-left: 2px solid #1f2937;
            padding-left: 10px;
        }

        /* ===== TABLE ===== */
        .regions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .region-section {
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 1px solid #dadce0;
            border-radius: 2px;
            overflow: hidden;
        }

        .region-title {
            font-size: 12.1px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #202124;
            background-color: #f8f9fa;
            padding: 13.2px 17.6px;
            border-bottom: 1px solid #dadce0;
            border-left: 3px solid #1f2937;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
        }

        thead th {
            font-size: 12.1px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #5f6368;
            padding: 13.2px 17.6px;
            text-align: left;
            background-color: #f8f9fa;
            border-bottom: 1px solid #dadce0;
            font-weight: 600;
        }

        tbody tr {
            border-bottom: 1px solid #e8eaed;
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        tbody tr.unavailable {
            background-color: #f8f9fa;
            opacity: 0.7;
        }

        tbody td {
            padding: 15.4px 17.6px;
            font-size: 14.3px;
            line-height: 1.5;
        }

        .country-cell {
            font-weight: 600;
            color: #202124;
            width: 150px;
            min-width: 150px;
            flex-shrink: 0;
        }

        .url-cell {
            color: #5f6368;
            font-size: 13.2px;
            flex-grow: 1;
            word-break: break-word;
            padding-right: 0;
        }

        .url-cell a {
            color: #1a73e8;
            text-decoration: none;
            transition: color 0.2s ease;
            padding: 2px 0;
            display: inline-block;
        }

        .url-cell a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        .url-unavailable {
            color: #80868b;
            font-size: 13.2px;
        }

        .status-cell {
            text-align: center;
            width: 140px;
            min-width: 140px;
            flex-shrink: 0;
            font-weight: 600;
            color: #202124;
            font-size: 13.2px;
            padding-left: 20px;
        }

        .status-empty {
            color: #dadce0;
            font-weight: 400;
            font-size: 13.2px;
        }

        .status-alert {
            color: #22863a;
            font-weight: 700;
            font-size: 13.2px;
        }

        .status-inactive {
            color: #d32f2f;
            font-weight: 700;
            font-size: 13.2px;
        }

        .footer {
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid #dadce0;
            text-align: center;
            font-size: 12.1px;
            color: #80868b;
        }

        .footer a {
            color: #1a73e8;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .main-container {

            .url-cell {

                font-size: 13.2px;

            tbody td {

                font-size: 13.2px;

            thead th {
                padding: 11px 15.4px;
                font-size: 11px;
            }

            .keywords-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 24px 20px;
            }

            h1 {
                font-size: 26.4px;
            }

            .login-box {
                padding: 36px 28px;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .last-update {
                text-align: left;
                margin-top: 8px;
            }

            tbody td, thead th {
                padding: 11px 13.2px;
                font-size: 12.1px;
            }

            .url-cell {
                max-width: 300px;
                font-size: 12.1px;
            }

            .country-cell {
                width: 120px;
                min-width: 120px;
            }

            .status-cell {
                width: 120px;
                min-width: 120px;
                font-size: 12.1px;
            }

            .regions-wrapper {
                gap: 28px;
            }

            .alert-item {
                padding: 11px;
                font-size: 13.2px;
            }

            .alerts-section {
                padding: 12px;
                margin-bottom: 24px;
            }

            .keywords-grid {
                grid-template-columns: 1fr;
            }

            .tabs-container {
                gap: 16px;
            }

            .tab-button {
                font-size: 12px;
                padding: 8px 0;
            }
        }
    </style>
</head>

        // ===== TAB SWITCHING =====
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Deactivate all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // ===== AUTHENTIFICATION =====
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('passwordInput');
            const errorMessage = document.getElementById('errorMessage');

            const inputHash = await hashPassword(passwordInput.value);

            if (inputHash === PASSWORD_HASH) {
                showDashboard();
                loadData();
            } else {
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }

        // ===== DÉCOMPTE DU PROCHAIN SCAN =====
        function startCountdown() {
            // Arrêter l'ancien interval s'il existe
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            // Calculer le prochain scan (2 heures après le dernier)
            // GitHub Actions exécute le scraper toutes les 2 heures
            // 12 scans/jour × ~4 min = 1440 min/mois (< 2000 quota gratuit)
            const now = new Date();
            nextScanTime = new Date(now.getTime() + 2 * 60 * 60 * 1000);

            // Mettre à jour immédiatement
            updateCountdown();

            // Mettre à jour toutes les secondes
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            if (!nextScanTime) return;

            const now = new Date();
            const diff = nextScanTime - now;

            if (diff <= 0) {
                document.getElementById('nextScanTime').textContent = 'En cours...';
                return;
            }

            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            let timeStr;
            if (hours > 0) {
                timeStr = `${hours}h ${minutes}m`;
            } else {
                timeStr = `${minutes}m ${seconds}s`;
            }

            document.getElementById('nextScanTime').textContent = timeStr;
        }

// ===== CHARGEMENT DES DONNÉES =====
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();

                sourcesData = data.sources || [];

                // Indexer les détections par pays
                detectionsMap = {};
                if (data.tenders && Array.isArray(data.tenders)) {
                    data.tenders.forEach(tender => {
                        if (tender.country) {
                            if (!detectionsMap[tender.country]) {
                                detectionsMap[tender.country] = [];
                            }
                            detectionsMap[tender.country].push(tender);
                        }
                    });
                }

                // Mettre à jour l'heure du dernier scan
                if (data.last_updated) {
                    const updateDate = new Date(data.last_updated);
                    const timeStr = updateDate.toLocaleString('fr-FR', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    document.getElementById('lastScanTime').textContent = timeStr;

                    // Démarrer le décompte
                    startCountdown();
                }

                renderAlerts();
                renderKeywords();
                renderTable();

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('regionsContainer').innerHTML =
                    '<p style="text-align: center; color: #d32f2f; padding: 40px 0; font-size: 14.3px;">Erreur lors du chargement des données</p>';
            }
        }

        // ===== AFFICHAGE DES ALERTES =====
        function renderAlerts() {
            const alertsList = document.getElementById('alertsList');

            if (!detectionsMap || Object.keys(detectionsMap).length === 0) {
                alertsList.innerHTML = '<div class="alerts-empty">Aucune alerte détectée pour le moment</div>';
                return;
            }

            // Collecter toutes les détections
            const allDetections = [];
            Object.entries(detectionsMap).forEach(([country, tenders]) => {
                tenders.forEach(tender => {
                    allDetections.push({
                        country: country,
                        title: tender.title,
                        keywords: tender.matched_keywords,
                        detected_at: tender.detected_at
                    });
                });
            });

            // Trier par date (les plus récentes en premier)
            allDetections.sort((a, b) => new Date(b.detected_at) - new Date(a.detected_at));

            // Afficher max 8 dernières alertes
            const recentAlerts = allDetections.slice(0, 8);

            if (recentAlerts.length === 0) {
                alertsList.innerHTML = '<div class="alerts-empty">Aucune alerte détectée pour le moment</div>';
                return;
            }

            let html = '';
            recentAlerts.forEach(alert => {
                const keywordsStr = alert.keywords.slice(0, 2).join(', ');
                html += `
                    <div class="alert-item">
                        <span class="alert-country">${alert.country}</span>
                        <div class="alert-title">${alert.title}</div>
                        <span class="alert-keywords">Mots-clés: ${keywordsStr}</span>
                    </div>
                `;
            });

            alertsList.innerHTML = html;
        }

        // ===== AFFICHAGE DES MOTS-CLÉS =====
        function renderKeywords() {
            const keywordsList = document.getElementById('keywordsList');
            let html = '<div class="keywords-grid">';

            Object.entries(ALL_KEYWORDS).forEach(([lang, keywords]) => {
                html += `
                    <div class="keywords-category">
                        <div class="keywords-category-title">${lang}</div>
                        <div class="keywords-list">
                            ${keywords.map(kw => `<div class="keyword-item">${kw}</div>`).join('')}
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            keywordsList.innerHTML = html;
        }

        // ===== RENDU DU TABLEAU =====
        function renderTable() {
            const container = document.getElementById('regionsContainer');

            // Grouper par région
            const grouped = {};
            sourcesData.forEach(source => {
                const region = source.region;
                if (!grouped[region]) {
                    grouped[region] = [];
                }
                grouped[region].push(source);
            });

            let html = '';

            Object.keys(grouped).forEach(region => {
                const countries = grouped[region];

                html += `
                    <div class="region-section">
                        <div class="region-title">${region}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Pays</th>
                                    <th>Lien</th>
                                    <th>Alerte</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                countries.forEach(source => {
                    const hasDetection = detectionsMap[source.country] && detectionsMap[source.country].length > 0;

                    // Vérifier s'il y a une détection 404
                    let statusHtml = '<span class="status-empty">−</span>';
                    if (hasDetection) {
                        const detection = detectionsMap[source.country][0];
                        if (detection.status === '404') {
                            statusHtml = '<span class="status-inactive">Page inactive</span>';
                        } else {
                            statusHtml = '<span class="status-alert">Offre</span>';
                        }
                    }

                    const isUnavailable = !source.url || source.url.includes('indisponible') || source.url.includes('unavailable');
                    const urlHtml = isUnavailable
                        ? '<span class="url-unavailable">URL indisponible</span>'
                        : `<a href="${source.url}" target="_blank" rel="noopener noreferrer">${source.url}</a>`;

                    const rowClass = isUnavailable ? ' class="unavailable"' : '';

                    html += `
                        <tr${rowClass}>
                            <td class="country-cell">${source.country}</td>
                            <td class="url-cell">${urlHtml}</td>
                            <td class="status-cell">${statusHtml}</td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').focus();
        });

        // Auto-refresh toutes les 5 minutes
        setInterval(() => {
            if (document.getElementById('dashboard').classList.contains('active')) {
                loadData();
            }
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
