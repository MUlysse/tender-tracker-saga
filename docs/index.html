<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tender Tracker SAGA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            color: #1a1a1a;
            font-size: 15.4px;
            line-height: 1.5;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .login-box {
            width: 100%;
            max-width: 360px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid #dadce0;
            border-radius: 2px;
        }

        .login-title {
            font-size: 30.8px;
            font-weight: 600;
            color: #202124;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .login-subtitle {
            font-size: 13.2px;
            color: #80868b;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12.1px;
            font-weight: 600;
            color: #202124;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 13.2px 13.2px;
            font-size: 15.4px;
            border: 1px solid #dadce0;
            background-color: #ffffff;
            color: #202124;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            border-radius: 2px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1f2937;
            box-shadow: 0 0 0 3px rgba(31, 41, 55, 0.1);
        }

        .login-button {
            padding: 13.2px 17.6px;
            margin-top: 8px;
            font-size: 15.4px;
            font-weight: 600;
            color: #ffffff;
            background-color: #1f2937;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: inherit;
            border-radius: 2px;
        }

        .login-button:hover {
            background-color: #111827;
        }

        .error-message {
            font-size: 13.2px;
            color: #d32f2f;
            text-align: center;
            display: none;
            margin-top: 12px;
        }

        /* ===== MAIN DASHBOARD ===== */
        .dashboard {
            display: none;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .dashboard.active {
            display: block;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 48px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 35.2px;
            font-weight: 700;
            color: #0a0a0a;
            letter-spacing: -0.5px;
        }

        .scan-info {
            display: flex;
            gap: 40px;
            font-size: 12.1px;
            color: #5f6368;
            text-align: right;
            line-height: 1.6;
        }

        .scan-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .scan-label {
            font-weight: 600;
            display: block;
            font-size: 11px;
        }

        .scan-time {
            display: block;
            font-size: 13.2px;
            color: #202124;
            font-weight: 500;
        }

        .scan-button {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            background-color: #1a73e8;
            border: 1px solid #1a73e8;
            cursor: pointer;
            transition: background-color 0.2s ease, opacity 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: inherit;
            border-radius: 2px;
            margin-top: 8px;
        }

        .scan-button:hover:not(:disabled) {
            background-color: #0d47a1;
        }

        .scan-button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ===== TABS ===== */
        .tabs-container {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 0;
        }

        .tab-button {
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            color: #5f6368;
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tab-button:hover {
            color: #202124;
        }

        .tab-button.active {
            color: #1f2937;
            border-bottom-color: #1f2937;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== ALERTES SECTION ===== */
        .alerts-section {
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 2px;
            padding: 16px;
            margin-bottom: 32px;
        }

        .alerts-title {
            font-size: 13.2px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #202124;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #1f2937;
        }

        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .alert-item {
            padding: 13.2px;
            background-color: #ffffff;
            border: 1px solid #e8eaed;
            border-left: 3px solid #1f2937;
            border-radius: 2px;
            font-size: 14.3px;
            transition: background-color 0.15s ease;
        }

        .alert-item:hover {
            background-color: #f8f9fa;
        }

        .alert-country {
            font-weight: 600;
            color: #202124;
            display: block;
            margin-bottom: 3px;
            font-size: 14.3px;
        }

        .alert-title {
            font-size: 13.2px;
            color: #5f6368;
            margin-bottom: 4px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .alert-keywords {
            font-size: 12.1px;
            color: #80868b;
            display: block;
        }

        .alerts-empty {
            font-size: 14.3px;
            color: #80868b;
            padding: 8px 12px;
        }

        /* ===== KEYWORDS SECTION ===== */
        .keywords-section {
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 2px;
            padding: 20px;
        }

        .keywords-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }

        .keywords-category {
            background-color: #ffffff;
            border: 1px solid #e8eaed;
            border-radius: 2px;
            padding: 16px;
        }

        .keywords-category-title {
            font-size: 12.1px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #202124;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e8eaed;
        }

        .keywords-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .keyword-item {
            font-size: 13.2px;
            color: #5f6368;
            padding: 6px 8px;
            background-color: #f8f9fa;
            border-radius: 2px;
            border-left: 2px solid #1f2937;
            padding-left: 10px;
        }

        /* ===== TABLE ===== */
        .regions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .region-section {
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 1px solid #dadce0;
            border-radius: 2px;
            overflow: hidden;
        }

        .region-title {
            font-size: 12.1px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
            background-color: #34495e;
            padding: 13.2px 17.6px;
            border-bottom: 2px solid #2c3e50;
            border-left: 4px solid #e74c3c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
        }

        thead th {
            font-size: 12.1px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #ffffff;
            padding: 13.2px 17.6px;
            text-align: left;
            background-color: #2c3e50;
            border-bottom: 2px solid #1a252f;
            font-weight: 700;
        }

        tbody tr {
            border-bottom: 1px solid #ddd;
            transition: background-color 0.15s ease;
            background-color: #ffffff;
        }

        tbody tr:hover {
            background-color: #e8f4f8;
        }

        tbody tr.unavailable {
            background-color: #f0f0f0;
            opacity: 0.7;
        }

        tbody td {
            padding: 15.4px 17.6px;
            font-size: 14.3px;
            line-height: 1.5;
            color: #1a1a1a;
        }

        .country-cell {
            font-weight: 700;
            color: #0a0a0a;
            width: 120px;
            min-width: 120px;
            max-width: 120px;
        }

        .url-cell {
            color: #5f6368;
            font-size: 13.2px;
            flex-grow: 1;
            word-break: break-word;
            min-width: 250px;
        }

        .url-cell a {
            color: #1a73e8;
            text-decoration: none;
            transition: color 0.2s ease;
            padding: 2px 0;
            display: inline-block;
        }

        .url-cell a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        .url-unavailable {
            color: #80868b;
            font-size: 13.2px;
        }

        .status-cell {
            text-align: center;
            width: 110px;
            min-width: 110px;
            max-width: 110px;
            font-weight: 600;
            color: #202124;
            font-size: 13.2px;
        }

        .status-empty {
            color: #dadce0;
            font-weight: 400;
            font-size: 13.2px;
        }

        .status-alert {
            color: #155724;
            font-weight: 700;
            font-size: 13.2px;
            background-color: #d4edda;
            padding: 4px 8px;
            border-radius: 3px;
        }

        .status-inactive {
            color: #721c24;
            font-weight: 700;
            font-size: 13.2px;
            background-color: #f8d7da;
            padding: 4px 8px;
            border-radius: 3px;
        }

        .keywords-cell {
            padding: 15.4px 17.6px;
            font-size: 12.1px;
            max-width: 300px;
        }

        .keywords-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .keyword-badge {
            background-color: transparent;
            border: none;
            border-radius: 0;
            padding: 0 4px;
            font-size: 12.1px;
            font-weight: 400;
            color: #202124;
            white-space: nowrap;
            display: inline;
        }

        .keyword-badge:after {
            content: ', ';
        }

        .keyword-badge:last-child:after {
            content: '';
        }

        .keywords-empty {
            color: #dadce0;
            font-weight: 400;
        }

        .reset-cell {
            text-align: center;
            width: 80px;
            min-width: 80px;
            max-width: 80px;
        }

        .reset-btn {
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 2px;
            padding: 6px 10px;
            font-size: 14px;
            color: #d32f2f;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .reset-btn:hover {
            background-color: #ffebee;
            border-color: #d32f2f;
            color: #b71c1c;
        }

        .reset-empty {
            color: #dadce0;
        }

        .status-clickable {
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 2px 6px;
            border-radius: 2px;
        }

        .status-clickable:hover {
            background-color: rgba(31, 41, 55, 0.1);
            text-decoration: underline;
        }

        /* ===== MODAL DÉTAILS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: #ffffff;
            border-radius: 2px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #dadce0;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid #dadce0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-title {
            font-size: 18.2px;
            font-weight: 600;
            color: #202124;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #5f6368;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: #202124;
        }

        .modal-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .detail-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-label {
            font-size: 12.1px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #5f6368;
        }

        .detail-value {
            font-size: 14.3px;
            color: #202124;
            padding: 12px;
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 2px;
            word-break: break-word;
            line-height: 1.5;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .detail-tag {
            background-color: #FFFF00;
            border: 1px solid #FFA500;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12.1px;
            font-weight: 600;
            color: black;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            padding: 0 24px 24px 24px;
            border-top: 1px solid #dadce0;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            font-size: 13.2px;
            font-weight: 600;
            border: 1px solid #dadce0;
            background-color: #ffffff;
            color: #1a73e8;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-btn:hover {
            background-color: #f8f9fa;
            border-color: #1f2937;
        }

        .modal-btn-primary {
            background-color: #1a73e8;
            color: #ffffff;
            border-color: #1a73e8;
        }

        .modal-btn-primary:hover {
            background-color: #0d47a1;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid #dadce0;
            text-align: center;
            font-size: 12.1px;
            color: #80868b;
        }

        .footer a {
            color: #1a73e8;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .main-container {
                padding: 32px 36px;
            }

            .url-cell {
                max-width: 500px;
                font-size: 13.2px;
            }

            tbody td {
                padding: 13.2px 15.4px;
                font-size: 13.2px;
            }

            thead th {
                padding: 11px 15.4px;
                font-size: 11px;
            }

            .keywords-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 24px 20px;
            }

            h1 {
                font-size: 26.4px;
            }

            .login-box {
                padding: 36px 28px;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .last-update {
                text-align: left;
                margin-top: 8px;
            }

            tbody td, thead th {
                padding: 11px 13.2px;
                font-size: 12.1px;
            }

            .url-cell {
                max-width: 300px;
                font-size: 12.1px;
            }

            .country-cell {
                width: 120px;
                min-width: 120px;
            }

            .status-cell {
                width: 120px;
                min-width: 120px;
                font-size: 12.1px;
            }

            .regions-wrapper {
                gap: 28px;
            }

            .alert-item {
                padding: 11px;
                font-size: 13.2px;
            }

            .alerts-section {
                padding: 12px;
                margin-bottom: 24px;
            }

            .keywords-grid {
                grid-template-columns: 1fr;
            }

            .tabs-container {
                gap: 16px;
            }

            .tab-button {
                font-size: 12px;
                padding: 8px 0;
            }
        }
    </style>
</head>
<body>
    <!-- ===== LOGIN SCREEN ===== -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2 class="login-title">TENDER-TRACKER</h2>
            <p class="login-subtitle">Accès Sécurisé</p>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="passwordInput">Code d'Accès</label>
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="••••••••"
                        required
                        autocomplete="off"
                    />
                </div>
                <button type="submit" class="login-button">Connexion</button>
            </form>

            <div class="error-message" id="errorMessage">Code incorrect. Réessayez.</div>
        </div>
    </div>

    <!-- ===== DASHBOARD ===== -->
    <div class="dashboard" id="dashboard">
        <div class="main-container">
            <div class="header-top">
                <h1>TENDER-TRACKER SAGA</h1>
                <div class="scan-info">
                    <div class="scan-box">
                        <span class="scan-label">Dernier Scan</span>
                        <span class="scan-time" id="lastScanTime">--:--</span>
                    </div>
                    <div class="scan-box">
                        <span class="scan-label">Prochain Scan</span>
                        <span class="scan-time" id="nextScanTime">--:--</span>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-button active" onclick="switchTab('alerts')">Dernières Alertes</button>
                <button class="tab-button" onclick="switchTab('keywords')">Mots-clés</button>
            </div>

            <!-- Alertes Tab -->
            <div id="alerts-tab" class="tab-content active"></div>

            <!-- Keywords Tab -->
            <div id="keywords-tab" class="tab-content">
                <div class="keywords-section">
                    <div id="keywordsList"></div>
                </div>
            </div>

            <!-- Tableau des régions -->
            <div class="regions-wrapper" id="regionsContainer">
                <p style="text-align: center; color: #80868b; padding: 40px 0; font-size: 14.3px;">Chargement des données...</p>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>Tender-Tracker SAGA © 2026 | Veille Automatisée 24/7</p>
            </div>
        </div>
    </div>

        // ===== TAB SWITCHING =====
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });

            // Deactivate all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {

            event.target.classList.add('active');

        // ===== AUTHENTIFICATION =====
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('passwordInput');
            const errorMessage = document.getElementById('errorMessage');

            const inputHash = await hashPassword(passwordInput.value);

            if (inputHash === PASSWORD_HASH) {
                showDashboard();
                loadData();
            } else {
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');

        // ===== DÉCOMPTE DU PROCHAIN SCAN =====
        function startCountdown(lastUpdatedTime) {
            // Arrêter l'ancien interval s'il existe
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            // Calculer le prochain scan basé sur le cron (toutes les 6h à partir de 0h UTC)
            // Cron: '0 */6 * * *' = 0h, 6h, 12h, 18h UTC
            const now = new Date();
            const currentHourUTC = now.getUTCHours();
            const currentMinUTC = now.getUTCMinutes();
            const currentSecUTC = now.getUTCSeconds();

            // Calculer l'heure du prochain scan (multiple de 6h suivant)
            let nextScanHour = Math.ceil(currentHourUTC / 6) * 6;
            if (nextScanHour >= 24) {
                nextScanHour = 0; // Demain à 0h
            }

            nextScanTime = new Date(now);
            nextScanTime.setUTCHours(nextScanHour, 0, 0, 0);

            // Si le prochain scan est passé aujourd'hui, prendre celui d'après (+ 6h)
            if (nextScanTime <= now) {
                nextScanTime.setUTCHours(nextScanHour + 6, 0, 0, 0);
                if (nextScanTime.getUTCHours() >= 24) {
                    nextScanTime.setUTCDate(nextScanTime.getUTCDate() + 1);
                    nextScanTime.setUTCHours((nextScanHour + 6) % 24, 0, 0, 0);
                }
            }

            // Mettre à jour immédiatement
            updateCountdown();

            // Mettre à jour toutes les secondes
            countdownInterval = setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            if (!nextScanTime) return;

            const now = new Date();
            const diff = nextScanTime - now;

            if (diff <= 0) {
                document.getElementById('nextScanTime').textContent = 'En cours...';
                return;
            }

            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            let timeStr;
            if (hours > 0) {
                timeStr = `${hours}h ${minutes}m`;
            } else {
                timeStr = `${minutes}m ${seconds}s`;
            }

            document.getElementById('nextScanTime').textContent = timeStr;
        }

// ===== CHARGEMENT DES DONNÉES =====
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();

                sourcesData = data.sources || [];

                // Indexer les détections par pays
                detectionsMap = {};
                if (data.tenders && Array.isArray(data.tenders)) {
                    data.tenders.forEach(tender => {
                        if (tender.country) {
                            if (!detectionsMap[tender.country]) {
                                detectionsMap[tender.country] = [];
                            }
                            detectionsMap[tender.country].push(tender);
                        }
                    });
                }

                // Mettre à jour l'heure du dernier scan
                if (data.last_updated) {
                    const updateDate = new Date(data.last_updated);
                    const timeStr = updateDate.toLocaleString('fr-FR', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    document.getElementById('lastScanTime').textContent = timeStr;

                    // Démarrer le décompte basé sur last_updated
                    startCountdown(data.last_updated);
                }

                renderKeywords();
                renderTable();

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('regionsContainer').innerHTML =
                    '<p style="text-align: center; color: #d32f2f; padding: 40px 0; font-size: 14.3px;">Erreur lors du chargement des données</p>';
            }
        }

        // ===== SUPPRESSION DES DÉTECTIONS =====
        async function resetDetection(detectionId, country) {
            if (!confirm(`Supprimer cette alerte pour ${country} ?`)) {
                return;
            }

            try {
                // Charger data.json
                const response = await fetch('data.json');
                const data = await response.json();

                // Supprimer la détection
                data.tenders = data.tenders.filter(t => t.id !== detectionId);

                // Envoyer à l'API GitHub pour mettre à jour le fichier
                let githubToken = localStorage.getItem('githubToken');
                if (!githubToken) {
                    // Demander le token
                    const token = prompt('Token GitHub requis pour mettre à jour :\n(Générer sur https://github.com/settings/tokens)');
                    if (!token) {
                        alert('Action annulée');
                        return;
                    }
                    localStorage.setItem('githubToken', token);
                    githubToken = token;
                }

                // Faire un commit sur GitHub via l'API
                const result = await updateDataJsonOnGitHub(data, githubToken, `Remove detection for ${country}`);

                if (result.success) {
                    alert('✅ Alerte supprimée pour tous les utilisateurs !');
                    location.reload();
                } else {
                    alert('❌ Erreur : ' + result.error);
                }
            } catch (error) {
                alert('❌ Erreur : ' + error.message);
            }
        }

        async function updateDataJsonOnGitHub(data, token, message) {
            try {
                // Récupérer le commit SHA actuel
                const repoUrl = 'https://api.github.com/repos/MUlysse/tender-tracker-saga/contents/docs/data.json';
                const getResponse = await fetch(repoUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!getResponse.ok) {
                    return { success: false, error: 'Token invalide ou permission refusée' };
                }

                const fileData = await getResponse.json();
                const currentSha = fileData.sha;

                // Encoder le nouveau contenu en base64
                const newContent = JSON.stringify(data, null, 2);
                const encodedContent = btoa(unescape(encodeURIComponent(newContent)));

                // Mettre à jour le fichier
                const updateResponse = await fetch(repoUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `🗑️ ${message}`,
                        content: encodedContent,
                        sha: currentSha
                    })
                });

                if (updateResponse.ok) {
                    return { success: true };
                } else {
                    const error = await updateResponse.json();
                    return { success: false, error: error.message };
                }
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        // ===== RENDU DU TABLEAU =====
        function renderTable() {
            const container = document.getElementById('regionsContainer');

            // Grouper par région
            const grouped = {};
            sourcesData.forEach(source => {
                const region = source.region;
                if (!grouped[region]) {
                    grouped[region] = [];
                }
                grouped[region].push(source);
            });

            let html = '';

            Object.keys(grouped).forEach(region => {
                const countries = grouped[region];

                html += `
                    <div class="region-section">
                        <div class="region-title">${region}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Pays</th>
                                    <th>Lien</th>
                                    <th>Alerte</th>
                                    <th>Mots-clés</th>
                                    <th style="text-align: center; width: 80px;">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                countries.forEach(source => {
                    const hasDetection = detectionsMap[source.country] && detectionsMap[source.country].length > 0;

                    // Vérifier s'il y a une détection 404
                    let statusHtml = '<span class="status-empty">−</span>';
                    let detectedKeywords = [];
                    if (hasDetection) {
                        const detection = detectionsMap[source.country][0];
                        const firstKeyword = detection.matched_keywords && detection.matched_keywords.length > 0 ? detection.matched_keywords[0] : '';
                            detectedKeywords = detection.matched_keywords || [];
                        if (detection.status === '404') {
                            statusHtml = `<span class="status-inactive">Page inactive</span>`;
                        } else {
                            statusHtml = `<span class="status-alert">Offre</span>`;
                        }
                    }

                    const isUnavailable = !source.url || source.url.includes('indisponible') || source.url.includes('unavailable');
                    const urlHtml = isUnavailable
                        ? '<span class="url-unavailable">URL indisponible</span>'
                        : `<a href="${source.url}" target="_blank" rel="noopener noreferrer">${source.url}</a>`;

                    const rowClass = isUnavailable ? ' class="unavailable"' : '';

                    const keywordsHtml = detectedKeywords && detectedKeywords.length > 0
                        ? `<div class="keywords-display">${detectedKeywords.slice(0, 5).map(kw => `<span class="keyword-badge">${kw}</span>`).join('')}</div>`
                        : '<span class="keywords-empty">−</span>';

                    const detectionId = hasDetection ? detectionsMap[source.country][0].id : '';
                    const resetBtn = hasDetection
                        ? `<button class="reset-btn" onclick="resetDetection('${detectionId}', '${source.country}')" title="Supprimer cette alerte">✕</button>`
                        : '<span class="reset-empty">−</span>';

                    html += `
                        <tr${rowClass}>
                            <td class="country-cell">${source.country}</td>
                            <td class="url-cell">${urlHtml}</td>
                            <td class="status-cell">${statusHtml}</td>
                            <td class="keywords-cell">${keywordsHtml}</td>
                            <td class="reset-cell">${resetBtn}</td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').focus();
        });

        // Auto-refresh toutes les 5 minutes
        setInterval(() => {
            if (document.getElementById('dashboard').classList.contains('active')) {
                loadData();
            }
        }, 5 * 60 * 1000);
