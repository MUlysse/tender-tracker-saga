<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tender Tracker SAGA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #202124;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .login-box {
            width: 100%;
            max-width: 360px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid #dadce0;
            border-radius: 2px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 600;
            color: #202124;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .login-subtitle {
            font-size: 12px;
            color: #80868b;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #202124;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px;
            font-size: 14px;
            border: 1px solid #dadce0;
            background-color: #ffffff;
            color: #202124;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            border-radius: 2px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1f2937;
            box-shadow: 0 0 0 3px rgba(31, 41, 55, 0.1);
        }

        .login-button {
            padding: 12px 16px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background-color: #1f2937;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-family: inherit;
            border-radius: 2px;
        }

        .login-button:hover {
            background-color: #111827;
        }

        .error-message {
            font-size: 12px;
            color: #d32f2f;
            text-align: center;
            display: none;
            margin-top: 12px;
        }

        /* ===== MAIN DASHBOARD ===== */
        .dashboard {
            display: none;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .dashboard.active {
            display: block;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 48px;
        }

        .header {
            margin-bottom: 28px;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #202124;
            letter-spacing: -0.5px;
        }

        /* ===== ALERTES SECTION ===== */
        .alerts-section {
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 2px;
            padding: 16px;
            margin-bottom: 32px;
        }

        .alerts-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #202124;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #1f2937;
        }

        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .alert-item {
            padding: 12px;
            background-color: #ffffff;
            border: 1px solid #e8eaed;
            border-left: 3px solid #1f2937;
            border-radius: 2px;
            font-size: 13px;
            transition: background-color 0.15s ease;
        }

        .alert-item:hover {
            background-color: #f8f9fa;
        }

        .alert-country {
            font-weight: 600;
            color: #202124;
            display: block;
            margin-bottom: 3px;
            font-size: 13px;
        }

        .alert-title {
            font-size: 12px;
            color: #5f6368;
            margin-bottom: 4px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .alert-keywords {
            font-size: 11px;
            color: #80868b;
            display: block;
        }

        .alerts-empty {
            font-size: 13px;
            color: #80868b;
            padding: 8px 12px;
        }

        /* ===== TABLE ===== */
        .regions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .region-section {
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 1px solid #dadce0;
            border-radius: 2px;
            overflow: hidden;
        }

        .region-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #202124;
            background-color: #f8f9fa;
            padding: 12px 16px;
            border-bottom: 1px solid #dadce0;
            border-left: 3px solid #1f2937;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
        }

        thead th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #5f6368;
            padding: 12px 16px;
            text-align: left;
            background-color: #f8f9fa;
            border-bottom: 1px solid #dadce0;
            font-weight: 600;
        }

        tbody tr {
            border-bottom: 1px solid #e8eaed;
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        tbody tr.unavailable {
            background-color: #f8f9fa;
            opacity: 0.7;
        }

        tbody td {
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.5;
        }

        .country-cell {
            font-weight: 600;
            color: #202124;
            width: 150px;
            min-width: 150px;
            flex-shrink: 0;
        }

        .url-cell {
            color: #5f6368;
            font-size: 12px;
            flex-grow: 1;
            word-break: break-word;
            padding-right: 0;
        }

        .url-cell a {
            color: #1a73e8;
            text-decoration: none;
            transition: color 0.2s ease;
            padding: 2px 0;
            display: inline-block;
        }

        .url-cell a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }

        .url-unavailable {
            color: #80868b;
            font-size: 12px;
        }

        .status-cell {
            text-align: center;
            width: 140px;
            min-width: 140px;
            flex-shrink: 0;
            font-weight: 600;
            color: #202124;
            font-size: 12px;
            padding-left: 20px;
        }

        .status-empty {
            color: #dadce0;
            font-weight: 400;
            font-size: 12px;
        }

        .status-alert {
            color: #1f2937;
            font-weight: 700;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .main-container {
                padding: 32px 36px;
            }

            .url-cell {
                max-width: 500px;
                font-size: 12px;
            }

            tbody td {
                padding: 12px 14px;
                font-size: 12px;
            }

            thead th {
                padding: 10px 14px;
                font-size: 10px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 24px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .login-box {
                padding: 36px 28px;
            }

            tbody td, thead th {
                padding: 10px 12px;
                font-size: 11px;
            }

            .url-cell {
                max-width: 300px;
                font-size: 11px;
            }

            .country-cell {
                width: 120px;
                min-width: 120px;
            }

            .status-cell {
                width: 120px;
                min-width: 120px;
                font-size: 11px;
            }

            .regions-wrapper {
                gap: 28px;
            }

            .alert-item {
                padding: 10px;
                font-size: 12px;
            }

            .alerts-section {
                padding: 12px;
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== LOGIN SCREEN ===== -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2 class="login-title">TENDER-TRACKER</h2>
            <p class="login-subtitle">Accès Sécurisé</p>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="passwordInput">Code d'Accès</label>
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="••••••••"
                        required
                        autocomplete="off"
                    />
                </div>
                <button type="submit" class="login-button">Connexion</button>
            </form>

            <div class="error-message" id="errorMessage">Code incorrect. Réessayez.</div>
        </div>
    </div>

    <!-- ===== DASHBOARD ===== -->
    <div class="dashboard" id="dashboard">
        <div class="main-container">
            <div class="header">
                <h1>TENDER-TRACKER SAGA</h1>
            </div>

            <!-- Alertes Section -->
            <div class="alerts-section">
                <div class="alerts-title">Dernières Alertes</div>
                <div class="alerts-list" id="alertsList">
                    <div class="alerts-empty">Chargement...</div>
                </div>
            </div>

            <!-- Tableau des régions -->
            <div class="regions-wrapper" id="regionsContainer">
                <p style="text-align: center; color: #80868b; padding: 40px 0; font-size: 13px;">Chargement des données...</p>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD_HASH = 'd398b29d3dbbb9bf201d4c7e1c19ff9d43c15fd45a0cec46fbe9885ec3f6e97f';

        let sourcesData = [];
        let detectionsMap = {};

        // ===== AUTHENTIFICATION =====
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('passwordInput');
            const errorMessage = document.getElementById('errorMessage');

            const inputHash = await hashPassword(passwordInput.value);

            if (inputHash === PASSWORD_HASH) {
                showDashboard();
                loadData();
            } else {
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }

        // ===== CHARGEMENT DES DONNÉES =====
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();

                sourcesData = data.sources || [];

                // Indexer les détections par pays
                detectionsMap = {};
                if (data.tenders && Array.isArray(data.tenders)) {
                    data.tenders.forEach(tender => {
                        if (tender.country) {
                            if (!detectionsMap[tender.country]) {
                                detectionsMap[tender.country] = [];
                            }
                            detectionsMap[tender.country].push(tender);
                        }
                    });
                }

                renderAlerts();
                renderTable();

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('regionsContainer').innerHTML =
                    '<p style="text-align: center; color: #d32f2f; padding: 40px 0; font-size: 13px;">Erreur lors du chargement des données</p>';
            }
        }

        // ===== AFFICHAGE DES ALERTES =====
        function renderAlerts() {
            const alertsList = document.getElementById('alertsList');

            if (!detectionsMap || Object.keys(detectionsMap).length === 0) {
                alertsList.innerHTML = '<div class="alerts-empty">Aucune alerte détectée pour le moment</div>';
                return;
            }

            // Collecter toutes les détections
            const allDetections = [];
            Object.entries(detectionsMap).forEach(([country, tenders]) => {
                tenders.forEach(tender => {
                    allDetections.push({
                        country: country,
                        title: tender.title,
                        keywords: tender.matched_keywords,
                        detected_at: tender.detected_at
                    });
                });
            });

            // Trier par date (les plus récentes en premier)
            allDetections.sort((a, b) => new Date(b.detected_at) - new Date(a.detected_at));

            // Afficher max 8 dernières alertes
            const recentAlerts = allDetections.slice(0, 8);

            if (recentAlerts.length === 0) {
                alertsList.innerHTML = '<div class="alerts-empty">Aucune alerte détectée pour le moment</div>';
                return;
            }

            let html = '';
            recentAlerts.forEach(alert => {
                const keywordsStr = alert.keywords.slice(0, 2).join(', ');
                html += `
                    <div class="alert-item">
                        <span class="alert-country">${alert.country}</span>
                        <div class="alert-title">${alert.title}</div>
                        <span class="alert-keywords">Mots-clés: ${keywordsStr}</span>
                    </div>
                `;
            });

            alertsList.innerHTML = html;
        }

        // ===== RENDU DU TABLEAU =====
        function renderTable() {
            const container = document.getElementById('regionsContainer');

            // Grouper par région
            const grouped = {};
            sourcesData.forEach(source => {
                const region = source.region;
                if (!grouped[region]) {
                    grouped[region] = [];
                }
                grouped[region].push(source);
            });

            let html = '';

            Object.keys(grouped).forEach(region => {
                const countries = grouped[region];

                html += `
                    <div class="region-section">
                        <div class="region-title">${region}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Pays</th>
                                    <th>Lien</th>
                                    <th>Alerte</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                countries.forEach(source => {
                    const hasDetection = detectionsMap[source.country] && detectionsMap[source.country].length > 0;
                    const statusHtml = hasDetection
                        ? '<span class="status-alert">NOUVELLE OFFRE</span>'
                        : '<span class="status-empty">−</span>';

                    const isUnavailable = !source.url || source.url.includes('indisponible') || source.url.includes('unavailable');
                    const urlHtml = isUnavailable
                        ? '<span class="url-unavailable">URL indisponible</span>'
                        : `<a href="${source.url}" target="_blank" rel="noopener noreferrer">${source.url}</a>`;

                    const rowClass = isUnavailable ? ' class="unavailable"' : '';

                    html += `
                        <tr${rowClass}>
                            <td class="country-cell">${source.country}</td>
                            <td class="url-cell">${urlHtml}</td>
                            <td class="status-cell">${statusHtml}</td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').focus();
        });

        // Auto-refresh toutes les 5 minutes
        setInterval(() => {
            if (document.getElementById('dashboard').classList.contains('active')) {
                loadData();
            }
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
