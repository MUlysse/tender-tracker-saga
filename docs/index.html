<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tender Tracker SAGA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Helvetica, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            font-size: 16px;
            line-height: 1.6;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 60px 40px;
            text-align: center;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 18px;
            font-size: 18px;
            border: 1px solid #d0d0d0;
            background-color: #ffffff;
            color: #1a1a1a;
            transition: border-color 0.2s ease;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1a1a1a;
            background-color: #fafafa;
        }

        .login-button {
            padding: 16px 18px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background-color: #1a1a1a;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        .login-button:hover {
            background-color: #333333;
        }

        .error-message {
            font-size: 14px;
            color: #8b0000;
            text-align: center;
            display: none;
            margin-top: 16px;
        }

        /* ===== MAIN DASHBOARD ===== */
        .dashboard {
            display: none;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .dashboard.active {
            display: block;
        }

        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 80px 60px;
        }

        .header {
            margin-bottom: 80px;
            border-bottom: 1px solid #d0d0d0;
            padding-bottom: 40px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #1a1a1a;
            letter-spacing: -1px;
        }

        /* ===== TABLE ===== */
        .regions-wrapper {
            display: flex;
            flex-direction: column;
            gap: 70px;
        }

        .region-section {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .region-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #1a1a1a;
            background-color: #f5f5f5;
            padding: 16px 24px;
            border-left: 4px solid #1a1a1a;
            margin-bottom: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
        }

        thead {
            background-color: #f9f9f9;
        }

        thead th {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: #666666;
            padding: 22px 24px;
            text-align: left;
            border-bottom: 2px solid #d0d0d0;
        }

        tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        tbody tr.unavailable {
            background-color: #fafafa;
        }

        tbody td {
            padding: 26px 24px;
            font-size: 18px;
            line-height: 1.7;
        }

        .country-cell {
            font-weight: 500;
            color: #1a1a1a;
            min-width: 200px;
        }

        .url-cell {
            color: #555555;
            font-size: 17px;
            max-width: 550px;
            word-break: break-word;
        }

        .url-cell a {
            color: #555555;
            text-decoration: none;
            border-bottom: 1px solid #cccccc;
            transition: border-color 0.2s ease;
        }

        .url-cell a:hover {
            border-bottom-color: #1a1a1a;
        }

        .url-unavailable {
            color: #aaaaaa;
            font-style: italic;
            font-size: 16px;
        }

        .status-cell {
            text-align: center;
            min-width: 160px;
            font-weight: 600;
            color: #1a1a1a;
            font-size: 18px;
        }

        .status-empty {
            color: #d0d0d0;
            font-weight: 400;
            font-size: 17px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .main-container {
                padding: 60px 40px;
            }

            h1 {
                font-size: 36px;
            }

            tbody td {
                padding: 22px 20px;
                font-size: 17px;
            }

            thead th {
                padding: 20px 20px;
            }

            .url-cell {
                max-width: 400px;
                font-size: 16px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 40px 24px;
            }

            h1 {
                font-size: 28px;
            }

            tbody td, thead th {
                padding: 18px 16px;
                font-size: 16px;
            }

            thead th {
                font-size: 12px;
            }

            .url-cell {
                max-width: 250px;
                font-size: 15px;
            }

            .country-cell {
                min-width: 160px;
            }

            .status-cell {
                min-width: 140px;
                font-size: 16px;
            }

            .login-box {
                padding: 40px 30px;
            }

            .login-title {
                font-size: 28px;
            }

            .header {
                margin-bottom: 50px;
                padding-bottom: 30px;
            }

            .regions-wrapper {
                gap: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== LOGIN SCREEN ===== -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h2 class="login-title">TENDER-TRACKER SAGA</h2>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="passwordInput">Code d'Accès</label>
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="Entrez votre code"
                        required
                        autocomplete="off"
                    />
                </div>
                <button type="submit" class="login-button">Accéder</button>
            </form>

            <div class="error-message" id="errorMessage">Code incorrect</div>
        </div>
    </div>

    <!-- ===== DASHBOARD ===== -->
    <div class="dashboard" id="dashboard">
        <div class="main-container">
            <div class="header">
                <h1>TENDER-TRACKER SAGA</h1>
            </div>

            <div class="regions-wrapper" id="regionsContainer">
                <p style="text-align: center; color: #999999; padding: 80px 0; font-size: 18px;">Chargement des données...</p>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD_HASH = 'd398b29d3dbbb9bf201d4c7e1c19ff9d43c15fd45a0cec46fbe9885ec3f6e97f';

        let sourcesData = [];
        let detectionsMap = {};

        // ===== AUTHENTIFICATION =====
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('passwordInput');
            const errorMessage = document.getElementById('errorMessage');

            const inputHash = await hashPassword(passwordInput.value);

            if (inputHash === PASSWORD_HASH) {
                showDashboard();
                loadData();
            } else {
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function showDashboard() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
        }

        // ===== CHARGEMENT DES DONNÉES =====
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();

                sourcesData = data.sources || [];

                // Indexer les détections par pays
                detectionsMap = {};
                if (data.tenders && Array.isArray(data.tenders)) {
                    data.tenders.forEach(tender => {
                        if (tender.country) {
                            if (!detectionsMap[tender.country]) {
                                detectionsMap[tender.country] = [];
                            }
                            detectionsMap[tender.country].push(tender);
                        }
                    });
                }

                renderTable();

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('regionsContainer').innerHTML =
                    '<p style="text-align: center; color: #8b0000; padding: 80px 0; font-size: 18px;">Erreur lors du chargement des données</p>';
            }
        }

        // ===== RENDU DU TABLEAU =====
        function renderTable() {
            const container = document.getElementById('regionsContainer');

            // Grouper par région
            const grouped = {};
            sourcesData.forEach(source => {
                const region = source.region;
                if (!grouped[region]) {
                    grouped[region] = [];
                }
                grouped[region].push(source);
            });

            let html = '';

            Object.keys(grouped).forEach(region => {
                const countries = grouped[region];

                html += `
                    <div class="region-section">
                        <div class="region-title">${region}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Pays</th>
                                    <th>Lien</th>
                                    <th>Statut / Alerte</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                countries.forEach(source => {
                    const hasDetection = detectionsMap[source.country] && detectionsMap[source.country].length > 0;
                    const statusHtml = hasDetection
                        ? '<strong>NOUVELLE OFFRE</strong>'
                        : '<span class="status-empty">-</span>';

                    const isUnavailable = !source.url || source.url.includes('indisponible') || source.url.includes('unavailable');
                    const urlHtml = isUnavailable
                        ? '<span class="url-unavailable">URL indisponible</span>'
                        : `<a href="${source.url}" target="_blank" rel="noopener noreferrer">${source.url}</a>`;

                    const rowClass = isUnavailable ? ' class="unavailable"' : '';

                    html += `
                        <tr${rowClass}>
                            <td class="country-cell">${source.country}</td>
                            <td class="url-cell">${urlHtml}</td>
                            <td class="status-cell">${statusHtml}</td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').focus();
        });

        // Auto-refresh toutes les 5 minutes (si authentifié)
        setInterval(() => {
            if (document.getElementById('dashboard').classList.contains('active')) {
                loadData();
            }
        }, 5 * 60 * 1000);

        // SÉCURITÉ : Aucune mémorisation
        // - Pas de localStorage
        // - Pas de sessionStorage
        // - Mot de passe demandé à chaque F5 / rechargement
        // - Les données sont chargées en mémoire RAM uniquement
    </script>
</body>
</html>
