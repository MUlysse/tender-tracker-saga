<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tender Tracker SAGA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            border-bottom: 1px solid #d0d0d0;
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #666666;
            font-weight: 400;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #d0d0d0;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-label {
            font-size: 12px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .regions-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .region {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .region-title {
            font-size: 12px;
            font-weight: 700;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 16px;
            background-color: #f5f5f5;
            border-left: 3px solid #1a1a1a;
            margin-bottom: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        thead th {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666666;
            padding: 14px 16px;
            text-align: left;
            border-bottom: 2px solid #d0d0d0;
            background-color: #f9f9f9;
        }

        tbody tr {
            border-bottom: 1px solid #e8e8e8;
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        tbody td {
            padding: 14px 16px;
            font-size: 13px;
        }

        td.country-name {
            font-weight: 500;
            color: #1a1a1a;
            min-width: 150px;
        }

        td.link-cell {
            color: #4a4a4a;
            word-break: break-all;
            font-size: 12px;
            max-width: 400px;
        }

        td.link-cell a {
            color: #4a4a4a;
            text-decoration: none;
            border-bottom: 1px solid #cccccc;
            transition: border-color 0.2s ease;
        }

        td.link-cell a:hover {
            border-bottom-color: #1a1a1a;
        }

        td.status-cell {
            text-align: center;
            min-width: 120px;
        }

        .alert-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            color: #1a1a1a;
            background-color: #fff3cd;
            border: 1px solid #d4a574;
            padding: 4px 8px;
            border-radius: 2px;
            letter-spacing: 0.3px;
        }

        .status-empty {
            color: #cccccc;
            font-size: 12px;
        }

        footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #d0d0d0;
            font-size: 12px;
            color: #999999;
            text-align: center;
        }

        footer .update-time {
            display: block;
            margin-top: 8px;
            font-size: 11px;
        }

        .loading-status {
            text-align: center;
            padding: 20px;
            color: #999999;
            font-size: 12px;
        }

        @media (max-width: 1024px) {
            .container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 24px;
            }

            td.link-cell {
                max-width: 250px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px 12px;
            }

            h1 {
                font-size: 20px;
            }

            thead th,
            tbody td {
                padding: 10px 12px;
                font-size: 12px;
            }

            td.link-cell {
                max-width: 150px;
                font-size: 11px;
            }

            .stats-bar {
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-top: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Tender Tracker SAGA</h1>
            <p class="subtitle">Veille Automatisée des Appels d'Offres - Ressources Domestiques et Fiscalité</p>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-label">Pays Couverts</div>
                    <div class="stat-value" id="totalCountries">74</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Sources Actives</div>
                    <div class="stat-value" id="totalSources">74</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Détections</div>
                    <div class="stat-value" id="detectionCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Mise à Jour</div>
                    <div class="stat-value" id="lastUpdateTime">--:--</div>
                </div>
            </div>
        </header>

        <!-- Tableau des régions -->
        <div class="regions-container" id="regionsContainer">
            <div class="loading-status">Chargement des données...</div>
        </div>

        <!-- Footer -->
        <footer>
            <p>Tender Tracker SAGA - Système de Veille Automatisée 24/7</p>
            <p class="update-time">Dernière mise à jour : <span id="updateDate">--</span></p>
        </footer>
    </div>

    <script>
        // Données statiques des pays et régions
        const countriesData = {
            'Caraïbes': [
                { country: 'Bahamas', url: 'https://www.bahamas.gov.bs/wps/portal/public/' },
                { country: 'British Virgin Islands', url: 'https://bvi.gov.vg/' },
                { country: 'Cayman Islands', url: 'https://www.caymanislands.ky/' },
                { country: 'Panama', url: 'https://www.panamacompra.gob.pa/' },
                { country: 'Bermuda', url: 'https://www.gov.bm/' },
                { country: 'St Kitts and Nevis', url: 'https://www.sknvibes.com/' },
                { country: 'Dominican Republic', url: 'https://www.comprasdominicana.gob.do/' }
            ],
            'Europe': [
                { country: 'Jersey', url: 'https://www.gov.je/' },
                { country: 'Gibraltar', url: 'https://www.gibraltar.gov.gi/' },
                { country: 'Liechtenstein', url: 'https://www.liechtenstein.li/' }
            ],
            'Afrique Francophone': [
                { country: 'Côte d\'Ivoire', url: 'https://www.marchespublics.ci/' },
                { country: 'Sénégal', url: 'https://www.marchespublics.sn/' },
                { country: 'Bénin', url: 'https://www.marchespublics.bj/' },
                { country: 'Burkina Faso', url: 'https://www.marchespublics.bf/' },
                { country: 'Mali', url: 'https://www.marchespublics.ml/' },
                { country: 'Niger', url: 'https://www.marchespublics.ne/' },
                { country: 'Togo', url: 'https://www.marchespublics.tg/' },
                { country: 'Guinée', url: 'https://www.marchespublics.gn/' },
                { country: 'Mauritanie', url: 'https://www.marchespublics.mr/' },
                { country: 'Gabon', url: 'https://www.marchespublics.ga/' },
                { country: 'Tchad', url: 'https://www.marchespublics.td/' },
                { country: 'RDC', url: 'https://www.marchespublics.cd/' },
                { country: 'Congo-Brazza', url: 'https://www.marchespublics.cg/' },
                { country: 'Djibouti', url: 'https://www.marchespublics.dj/' },
                { country: 'Cameroun', url: 'https://www.marchespublics.cm/' },
                { country: 'Guinée équatoriale', url: 'https://www.marchespublics.gq/' }
            ],
            'Afrique Anglophone': [
                { country: 'Kenya', url: 'https://www.treasury.go.ke/' },
                { country: 'Tanzania', url: 'https://www.mof.go.tz/' },
                { country: 'Uganda', url: 'https://gpp.ppda.go.ug/' },
                { country: 'Rwanda', url: 'https://www.rgb.rw/' },
                { country: 'Ethiopia', url: 'https://www.mofed.gov.et/' },
                { country: 'South Africa', url: 'https://www.gpwonline.co.za/' },
                { country: 'Nigeria', url: 'https://www.bpp.gov.ng/' },
                { country: 'Ghana', url: 'https://www.mofep.gov.gh/' },
                { country: 'Zambia', url: 'https://www.mof.gov.zm/' },
                { country: 'Botswana', url: 'https://www.gov.bw/' },
                { country: 'Malawi', url: 'https://www.mof.gov.mw/' },
                { country: 'Sierra Leone', url: 'https://www.statehouse.gov.sl/' },
                { country: 'Liberia', url: 'https://www.mof.gov.lr/' },
                { country: 'Lesotho', url: 'https://www.gov.ls/' },
                { country: 'Zimbabwe', url: 'https://www.zimtreasury.gov.zw/' },
                { country: 'Gambia', url: 'https://www.treasury.gm/' }
            ],
            'Afrique Lusophone': [
                { country: 'Mozambique', url: 'https://www.mof.gov.mz/' },
                { country: 'Angola', url: 'https://www.minfin.gov.ao/' },
                { country: 'Cape Verde', url: 'https://www.gov.cv/' }
            ],
            'Maghreb & Moyen-Orient': [
                { country: 'Morocco', url: 'https://www.maroc.ma/' },
                { country: 'Algeria', url: 'https://www.mf.gov.dz/' },
                { country: 'Tunisia', url: 'https://www.finances.gov.tn/' },
                { country: 'Saudi Arabia', url: 'https://www.saudia.gov.sa/' },
                { country: 'Oman', url: 'https://www.mof.gov.om/' },
                { country: 'Egypt', url: 'https://www.mof.gov.eg/' },
                { country: 'UAE', url: 'https://www.mof.gov.ae/' },
                { country: 'Qatar', url: 'https://www.mof.gov.qa/' },
                { country: 'Bahrain', url: 'https://www.mof.gov.bh/' }
            ],
            'Océan Indien': [
                { country: 'Mauritius', url: 'https://www.mof.gov.mu/' },
                { country: 'Seychelles', url: 'https://www.mof.gov.sc/' },
                { country: 'Madagascar', url: 'https://www.mef.gov.mg/' },
                { country: 'Comoros', url: 'https://www.mf.gov.km/' }
            ],
            'Asie': [
                { country: 'Thailand', url: 'https://www.mpac.go.th/' },
                { country: 'Indonesia', url: 'https://www.lkpp.go.id/' },
                { country: 'Singapore', url: 'https://www.gebiz.gov.sg/' }
            ],
            'Organisations Internationales': [
                { country: 'World Bank', url: 'https://www.worldbank.org/en/projects-operations/products-and-services/brief/world-bank-procurement-notices' },
                { country: 'AfDB', url: 'https://www.afdb.org/en/business/opportunities/procurement' },
                { country: 'GIZ (Germany)', url: 'https://www.giz.de/en/' },
                { country: 'AFD (France)', url: 'https://www.afd.fr/en' },
                { country: 'Norad (Norway)', url: 'https://www.norad.no/' },
                { country: 'Danida (Denmark)', url: 'https://um.dk/en/danida' },
                { country: 'SIDA (Sweden)', url: 'https://www.sida.se/' },
                { country: 'JICA (Japan)', url: 'https://www.jica.go.jp/' }
            ]
        };

        let detectionsByCountry = {};

        // Charger les données
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();

                // Indexer les détections par pays
                detectionsByCountry = {};
                if (data.tenders && Array.isArray(data.tenders)) {
                    data.tenders.forEach(tender => {
                        if (!detectionsByCountry[tender.country]) {
                            detectionsByCountry[tender.country] = [];
                        }
                        detectionsByCountry[tender.country].push(tender);
                    });
                }

                // Mettre à jour les stats
                const detectionCount = Object.keys(detectionsByCountry).length;
                document.getElementById('detectionCount').textContent = detectionCount;

                if (data.last_updated) {
                    const updateDate = new Date(data.last_updated);
                    document.getElementById('lastUpdateTime').textContent = updateDate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                    document.getElementById('updateDate').textContent = updateDate.toLocaleString('fr-FR', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }

                // Afficher le tableau
                renderTable();

            } catch (error) {
                console.error('Erreur lors du chargement:', error);
                document.getElementById('regionsContainer').innerHTML = '<div class="loading-status">Impossible de charger les données</div>';
            }
        }

        function renderTable() {
            const container = document.getElementById('regionsContainer');
            let html = '';

            for (const [region, countries] of Object.entries(countriesData)) {
                html += `
                    <div class="region">
                        <div class="region-title">${region}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Pays</th>
                                    <th>Lien</th>
                                    <th>Statut / Alerte</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                countries.forEach(item => {
                    const hasDetection = detectionsByCountry[item.country] && detectionsByCountry[item.country].length > 0;
                    const statusHtml = hasDetection
                        ? `<span class="alert-badge">Nouvelle offre détectée</span>`
                        : `<span class="status-empty">-</span>`;

                    html += `
                        <tr>
                            <td class="country-name">${item.country}</td>
                            <td class="link-cell"><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.url}</a></td>
                            <td class="status-cell">${statusHtml}</td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Initialiser au chargement
        document.addEventListener('DOMContentLoaded', loadData);

        // Actualiser toutes les 5 minutes
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
